version: '3.8'

services:
  global-load-balancer-edge:
    image: nginx:alpine
    container_name: global_load_balancer_edge
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./edge-nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      global-load-balancer-primary:
        condition: service_healthy
      global-load-balancer-backup:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  global-load-balancer-primary:
    image: nginx:alpine
    container_name: global_load_balancer_primary
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "8088:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  global-load-balancer-backup:
    image: nginx:alpine
    container_name: global_load_balancer_backup
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s
