events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=5s ipv6=off;

    upstream load_balancer_nodes {
        server global-load-balancer-primary:80 max_fails=1 fail_timeout=3s;
        server global-load-balancer-backup:80 backup max_fails=1 fail_timeout=3s;
        keepalive 16;
    }

    server {
        listen 80;

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "edge-load-balancer OK\n";
        }

        location / {
            proxy_pass http://load_balancer_nodes;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 1s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
