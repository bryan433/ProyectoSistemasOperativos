# =============================================================
#  PostgreSQL 15 — Configuración del Servidor Primario
#  Habilita Streaming Replication hacia la réplica
# =============================================================

# --- Conexión ---
listen_addresses = '*'
port = 5432
max_connections = 100

# --- Write-Ahead Logging (WAL) para replicación ---
wal_level = replica                # Mínimo para streaming replication
max_wal_senders = 3                # Máximo de réplicas conectadas simultáneamente
max_replication_slots = 3          # Slots de replicación
wal_keep_size = 64MB               # Espacio mínimo de WAL retenido

# --- Hot Standby (permite consultas en réplica) ---
hot_standby = on

# --- Logging ---
log_destination = 'stderr'
logging_collector = off
log_min_messages = warning
log_min_error_statement = error

# --- Rendimiento ---
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB
