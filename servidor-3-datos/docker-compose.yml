#  SERVIDOR 3 — CAPA DE DATOS CENTRALIZADA (ALTA DISPONIBILIDAD)
#  etcd: Distributed Configuration Store
#  patroni1 & patroni2: Nodos de PostgreSQL gestionados por Patroni
#  haproxy: Enrutador Inteligente (Punto de entrada)
#  db-init: Contenedor efímero para crear esquemas iniciales

networks:
  red_datos:
    driver: bridge

volumes:
  etcd_data:
  pgdata1:
  pgdata2:

services:
  # 1. Distributed Configuration Store (DCS)
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: c10_etcd
    command: /usr/local/bin/etcd --name etcd --advertise-client-urls http://etcd:2379 --listen-client-urls http://0.0.0.0:2379 --initial-advertise-peer-urls http://etcd:2380 --listen-peer-urls http://0.0.0.0:2380 --initial-cluster etcd=http://etcd:2380 --data-dir /etcd-data
    restart: unless-stopped
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd_data:/etcd-data
    networks:
      - red_datos

  # 2. Nodo 1 (PostgreSQL + Patroni)
  patroni1:
    build:
      context: ./patroni-node
      dockerfile: Dockerfile
    container_name: c11_patroni1
    restart: unless-stopped
    environment:
      PATRONI_NAME: patroni1
      ETCD_HOST: etcd:2379
      PATRONI_POSTGRES_LISTEN: 0.0.0.0:5432
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      POSTGRES_USER: admin_salud
      POSTGRES_PASSWORD: SaludSegura2025!
      REPLICATION_USER: replicador
      REPLICATION_PASSWORD: ReplPass2025!
    volumes:
      - pgdata1:/var/lib/postgresql/data
    networks:
      - red_datos
    depends_on:
      - etcd

  # 3. Nodo 2 (PostgreSQL + Patroni)
  patroni2:
    build:
      context: ./patroni-node
      dockerfile: Dockerfile
    container_name: c12_patroni2
    restart: unless-stopped
    environment:
      PATRONI_NAME: patroni2
      ETCD_HOST: etcd:2379
      PATRONI_POSTGRES_LISTEN: 0.0.0.0:5432
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      POSTGRES_USER: admin_salud
      POSTGRES_PASSWORD: SaludSegura2025!
      REPLICATION_USER: replicador
      REPLICATION_PASSWORD: ReplPass2025!
    volumes:
      - pgdata2:/var/lib/postgresql/data
    networks:
      - red_datos
    depends_on:
      - etcd

  # 4. Enrutador Inteligente (HAProxy)
  # Este es el único servicio que expone el puerto 5432 hacia afuera (o hacia otras redes Docker)
  haproxy:
    image: haproxy:alpine
    container_name: c13_haproxy_db
    restart: unless-stopped
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "15432:5432" # Expuesto al host local (como estaba el primary antes)
      - "7000:7000"  # Panel de métricas de HAProxy
    networks:
      - red_datos
    depends_on:
      - patroni1
      - patroni2

  # 5. Inicializador de Base de Datos
  db-init:
    build:
      context: ./db-init
      dockerfile: Dockerfile
    container_name: c14_db_init
    environment:
      PGHOST: haproxy
      PGPORT: 5432
      PGUSER: admin_salud
      PGPASSWORD: SaludSegura2025!
    networks:
      - red_datos
    depends_on:
      - haproxy
