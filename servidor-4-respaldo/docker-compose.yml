version: "3.9"

#  SERVIDOR 4 — RESPALDO DE BASE DE DATOS
#  Contenedor que ejecuta pg_dump automáticamente cada hora
#  y guarda los volcados en ./backups/ (carpeta local).
#
#  Para correr el servidor 4 se utiliza el comando
#  docker-compose up -d

networks:
  red_respaldo:
    driver: bridge

volumes:
  backup_data:

services:

  #  Respaldo Automatizado
  #  Usa pg_dump + cron para extraer volcados periódicos
  backup-service:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: c13_backup_service
    restart: unless-stopped
    environment:
      # Dirección del Servidor 3 (postgres-primary)
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: admin_salud
      DB_PASSWORD: SaludSegura2025!
      # Bases de datos a respaldar
      DB_NAMES: db_pagos_atencion,db_medico
      # Intervalo en minutos entre cada respaldo
      BACKUP_INTERVAL_MINUTES: 60
    volumes:
      - backup_data:/backups
      - ./backups:/backups-local
    networks:
      - red_respaldo
